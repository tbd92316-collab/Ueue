name: Ultimate Camera Build Pipeline

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  create-and-build-apk:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK Path Environment
      run: |
        echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
        echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
        echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH

    - name: Generate Project Directories
      run: |
        mkdir -p app/src/main/java/com/ai/ultracamera
        mkdir -p app/src/main/res/layout
        mkdir -p app/src/main/res/values
        mkdir -p app/src/main/assets

    - name: Create gradle.properties
      run: |
        cat << 'EOF' > gradle.properties
        android.useAndroidX=true
        android.enableJetifier=true
        org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
        EOF

    - name: Create settings.gradle
      run: |
        cat << 'EOF' > settings.gradle
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
                google()
                mavenCentral()
            }
        }
        rootProject.name = "AI Ultra Camera"
        include ':app'
        EOF

    - name: Create Root build.gradle
      run: |
        cat << 'EOF' > build.gradle
        buildscript {
            repositories {
                google()
                mavenCentral()
            }
            dependencies {
                classpath 'com.android.tools.build:gradle:8.1.4'
            }
        }
        plugins {
            id 'com.android.application' version '8.1.4' apply false
        }
        EOF

    - name: Create App build.gradle
      run: |
        cat << 'EOF' > app/build.gradle
        plugins {
            id 'com.android.application'
        }

        android {
            namespace 'com.ai.ultracamera'
            compileSdk 33

            defaultConfig {
                applicationId "com.ai.ultracamera"
                minSdk 21
                targetSdk 33
                versionCode 1
                versionName "1.0"
            }

            buildTypes {
                release {
                    minifyEnabled false
                    proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                }
            }
            compileOptions {
                sourceCompatibility JavaVersion.VERSION_17
                targetCompatibility JavaVersion.VERSION_17
            }
        }

        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.8.0'
        }
        EOF

    - name: Create AndroidManifest.xml
      run: |
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">

            <uses-permission android:name="android.permission.INTERNET" />
            <uses-permission android:name="android.permission.CAMERA" />
            <uses-permission android:name="android.permission.RECORD_AUDIO" />
            <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />
            
            <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="28" />
            <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />
            <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />
            <uses-permission android:name="android.permission.READ_MEDIA_VIDEO" />
            <uses-permission android:name="android.permission.READ_MEDIA_AUDIO" />

            <uses-feature android:name="android.hardware.camera" android:required="true" />
            <uses-feature android:name="android.hardware.camera.autofocus" android:required="false" />
            <uses-feature android:name="android.hardware.microphone" android:required="true" />

            <application
                android:allowBackup="true"
                android:label="AI ULTRA CAMERA"
                android:supportsRtl="true"
                android:theme="@style/Theme.AppCompat.NoActionBar"
                android:hardwareAccelerated="true"
                android:usesCleartextTraffic="true">
                
                <activity
                    android:name="com.ai.ultracamera.MainActivity"
                    android:exported="true"
                    android:screenOrientation="portrait"
                    android:configChanges="orientation|screenSize|keyboardHidden">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

    - name: Create activity_main.xml Layout
      run: |
        cat << 'EOF' > app/src/main/res/layout/activity_main.xml
        <?xml version="1.0" encoding="utf-8"?>
        <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent"
            android:layout_height="match_parent">
            <android.webkit.WebView
                android:id="@+id/webview"
                android:layout_width="match_parent"
                android:layout_height="match_parent" />
        </RelativeLayout>
        EOF

    - name: Create MainActivity.java
      run: |
        cat << 'EOF' > app/src/main/java/com/ai/ultracamera/MainActivity.java
        package com.ai.ultracamera;

        import android.Manifest;
        import android.content.ContentValues;
        import android.content.Context;
        import android.content.pm.PackageManager;
        import android.media.MediaScannerConnection;
        import android.net.Uri;
        import android.os.Build;
        import android.os.Bundle;
        import android.os.Environment;
        import android.provider.MediaStore;
        import android.util.Base64;
        import android.webkit.JavascriptInterface;
        import android.webkit.PermissionRequest;
        import android.webkit.WebChromeClient;
        import android.webkit.WebSettings;
        import android.webkit.WebView;
        import android.webkit.WebViewClient;
        import android.widget.Toast;
        import androidx.appcompat.app.AppCompatActivity;
        import androidx.core.app.ActivityCompat;
        import androidx.core.content.ContextCompat;
        import java.io.File;
        import java.io.FileOutputStream;
        import java.io.OutputStream;
        import java.util.ArrayList;
        import java.util.List;

        public class MainActivity extends AppCompatActivity {
            private WebView myWebView;
            private static final int PERMISSION_REQUEST_CODE = 1001;

            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                setContentView(R.layout.activity_main);

                myWebView = findViewById(R.id.webview);
                WebSettings webSettings = myWebView.getSettings();
                
                webSettings.setJavaScriptEnabled(true);
                webSettings.setDomStorageEnabled(true);
                webSettings.setMediaPlaybackRequiresUserGesture(false);
                webSettings.setAllowFileAccess(true);
                webSettings.setAllowContentAccess(true);

                myWebView.addJavascriptInterface(new WebAppInterface(this), "AndroidBridge");

                myWebView.setWebViewClient(new WebViewClient());
                myWebView.setWebChromeClient(new WebChromeClient() {
                    @Override
                    public void onPermissionRequest(final PermissionRequest request) {
                        if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.LOLLIPOP) {
                            request.grant(request.getResources());
                        }
                    }
                });

                myWebView.loadUrl("file:///android_asset/index.html");
                checkAndRequestPermissions();
            }

            public class WebAppInterface {
                Context mContext;
                WebAppInterface(Context c) { mContext = c; }

                @JavascriptInterface
                public void saveImageToGallery(String base64Data) {
                    try {
                        byte[] decodedBytes = Base64.decode(base64Data, Base64.DEFAULT);
                        String fileName = "AI_Photo_" + System.currentTimeMillis() + ".png";
                        OutputStream fos;

                        if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.Q) {
                            ContentValues resolverValues = new ContentValues();
                            resolverValues.put(MediaStore.MediaColumns.DISPLAY_NAME, fileName);
                            resolverValues.put(MediaStore.MediaColumns.MIME_TYPE, "image/png");
                            resolverValues.put(MediaStore.MediaColumns.RELATIVE_PATH, Environment.DIRECTORY_DCIM + "/Camera");
                            Uri imageUri = mContext.getContentResolver().insert(MediaStore.Images.Media.EXTERNAL_CONTENT_URI, resolverValues);
                            fos = mContext.getContentResolver().openOutputStream(imageUri);
                        } else {
                            File imagesDir = Environment.getExternalStoragePublicDirectory(Environment.DIRECTORY_DCIM);
                            File cameraDir = new File(imagesDir, "Camera");
                            if (!cameraDir.exists()) cameraDir.mkdirs();
                            File file = new File(cameraDir, fileName);
                            fos = new FileOutputStream(file);
                            MediaScannerConnection.scanFile(mContext, new String[]{file.toString()}, null, null);
                        }

                        fos.write(decodedBytes);
                        fos.flush();
                        fos.close();
                        showToast("Photo Saved directly to Gallery!");
                    } catch (Exception e) {
                        showToast("Photo Save Failed: " + e.getMessage());
                    }
                }

                @JavascriptInterface
                public void saveVideoToGallery(String base64Data) {
                    try {
                        byte[] decodedBytes = Base64.decode(base64Data, Base64.DEFAULT);
                        String fileName = "AI_Video_" + System.currentTimeMillis() + ".mp4";
                        OutputStream fos;

                        if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.Q) {
                            ContentValues resolverValues = new ContentValues();
                            resolverValues.put(MediaStore.MediaColumns.DISPLAY_NAME, fileName);
                            resolverValues.put(MediaStore.MediaColumns.MIME_TYPE, "video/mp4");
                            resolverValues.put(MediaStore.MediaColumns.RELATIVE_PATH, Environment.DIRECTORY_MOVIES + "/Camera");
                            Uri videoUri = mContext.getContentResolver().insert(MediaStore.Video.Media.EXTERNAL_CONTENT_URI, resolverValues);
                            fos = mContext.getContentResolver().openOutputStream(videoUri);
                        } else {
                            File moviesDir = Environment.getExternalStoragePublicDirectory(Environment.DIRECTORY_MOVIES);
                            File cameraDir = new File(moviesDir, "Camera");
                            if (!cameraDir.exists()) cameraDir.mkdirs();
                            File file = new File(cameraDir, fileName);
                            fos = new FileOutputStream(file);
                            MediaScannerConnection.scanFile(mContext, new String[]{file.toString()}, null, null);
                        }

                        fos.write(decodedBytes);
                        fos.flush();
                        fos.close();
                        showToast("Video Saved directly to Gallery!");
                    } catch (Exception e) {
                        showToast("Video Save Failed: " + e.getMessage());
                    }
                }

                private void showToast(final String message) {
                    runOnUiThread(() -> Toast.makeText(mContext, message, Toast.LENGTH_SHORT).show());
                }
            }

            private void checkAndRequestPermissions() {
                List<String> permissionsNeeded = new ArrayList<>();
                permissionsNeeded.add(Manifest.permission.CAMERA);
                permissionsNeeded.add(Manifest.permission.RECORD_AUDIO);

                if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU) {
                    permissionsNeeded.add(Manifest.permission.READ_MEDIA_IMAGES);
                    permissionsNeeded.add(Manifest.permission.READ_MEDIA_VIDEO);
                } else {
                    permissionsNeeded.add(Manifest.permission.WRITE_EXTERNAL_STORAGE);
                    permissionsNeeded.add(Manifest.permission.READ_EXTERNAL_STORAGE);
                }

                List<String> listPermissionsAssign = new ArrayList<>();
                for (String perm : permissionsNeeded) {
                    if (ContextCompat.checkSelfPermission(this, perm) != PackageManager.PERMISSION_GRANTED) {
                        listPermissionsAssign.add(perm);
                    }
                }
                if (!listPermissionsAssign.isEmpty()) {
                    ActivityCompat.requestPermissions(this, listPermissionsAssign.toArray(new String[0]), PERMISSION_REQUEST_CODE);
                }
            }
        }
        EOF

    - name: Injection HTML Assets Camera App (100x Zoom & Ultra Stabilization)
      run: |
        cat << 'EOF' > app/src/main/assets/index.html
        <!DOCTYPE html>
        <html lang="en">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
            <title>AI ULTRA CAMERA</title>
            <style>
                body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
                #camera-container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
                
                /* Video element with hardware-accelerated transitions */
                video { width: 100%; height: 100%; object-fit: cover; transform-origin: center center; transition: transform 0.15s cubic-bezier(0.1, 0.8, 0.2, 1), filter 0.2s ease; }
                
                .ai-enhanced { filter: saturate(1.25) contrast(1.15) brightness(1.05) sharp(1.1); }
                
                /* High Digital Gyro-Stabilization CSS Effect */
                .stabilized { 
                    transition: transform 0.45s cubic-bezier(0.05, 0.7, 0.1, 1.0) !important; 
                    animation: gimbal-simulation 1.5s infinite alternate ease-in-out;
                }
                
                .controls { position: absolute; bottom: 30px; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 15px; z-index: 100; }
                .shutter-group { display: flex; align-items: center; gap: 30px; }
                #snap-btn { width: 70px; height: 70px; background: #fff; border: 2px solid #fff; border-radius: 50%; cursor: pointer; }
                #record-btn { width: 60px; height: 60px; background: #ff0000; border: none; border-radius: 50%; cursor: pointer; }
                .recording { animation: blink 1s infinite; }
                @keyframes blink { 50% { opacity: 0.5; } }
                
                .zoom-container { width: 80%; display: flex; align-items: center; gap: 10px; }
                input[type=range] { flex-grow: 1; accent-color: #00ffcc; }
                
                .settings-bar { position: absolute; top: 20px; width: 92%; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 12px; backdrop-filter: blur(10px); z-index: 200; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
                .btn-group { display: flex; gap: 8px; }
                select { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid #444; border-radius: 6px; font-size: 11px; padding: 6px 8px; outline: none; }
                
                .action-toggle { background: none; border: 1px solid #00ffcc; color: #00ffcc; border-radius: 6px; padding: 6px 12px; font-size: 11px; font-weight: bold; cursor: pointer; transition: all 0.2s ease; }
                #stab-toggle { border-color: #ffcc00; color: #ffcc00; }
            </style>
        </head>
        <body>
        <div id="camera-container">
            <video id="video" autoplay playsinline muted></video>
            <div class="settings-bar">
                <div style="display:flex; gap: 5px;">
                    <select id="res-select">
                        <option value="426,240">240p</option>
                        <option value="1280,720" selected>720p (HD)</option>
                        <option value="1920,1080">1080p (FHD)</option>
                        <option value="3840,2160">4K (UHD)</option>
                    </select>
                    <select id="fps-select">
                        <option value="15">15 FPS</option>
                        <option value="30" selected>30 FPS</option>
                        <option value="60">60 FPS</option>
                    </select>
                </div>
                <div class="btn-group">
                    <button id="ai-toggle" class="action-toggle">AI OFF</button>
                    <button id="stab-toggle" class="action-toggle">STAB OFF</button>
                </div>
            </div>
            <div class="controls">
                <div id="zoom-label" style="font-weight:bold; font-size:14px; text-shadow: 0 2px 4px #000;">Zoom: 1.0x</div>
                <div class="zoom-container">
                    <span>1x</span>
                    <input type="range" id="zoom-slider" min="1" max="100" step="0.5" value="1">
                    <span>100x</span>
                </div>
                <div class="shutter-group">
                    <button id="record-btn" title="Record Video"></button>
                    <button id="snap-btn" title="Take Photo"></button>
                </div>
            </div>
        </div>
        <script>
            const video = document.getElementById('video');
            const zoomSlider = document.getElementById('zoom-slider');
            const zoomLabel = document.getElementById('zoom-label');
            const resSelect = document.getElementById('res-select');
            const fpsSelect = document.getElementById('fps-select');
            const aiToggle = document.getElementById('ai-toggle');
            const stabToggle = document.getElementById('stab-toggle');
            const snapBtn = document.getElementById('snap-btn');
            const recordBtn = document.getElementById('record-btn');
            let mediaRecorder;
            let recordedChunks = [];
            let isAiEnhanced = false;
            let isStabilized = false;
            let currentZoom = 1;

            async function initCamera() {
                if (window.stream) { window.stream.getTracks().forEach(track => track.stop()); }
                const [width, height] = resSelect.value.split(',').map(Number);
                const fps = parseInt(fpsSelect.value);
                const constraints = {
                    video: { width: { ideal: width }, height: { ideal: height }, frameRate: { ideal: fps }, facingMode: "environment" },
                    audio: true
                };
                try {
                    const stream = await navigator.mediaDevices.getUserMedia(constraints);
                    window.stream = stream;
                    video.srcObject = stream;
                } catch (err) {
                    alert("Hardware Camera Setup Failed.");
                }
            }

            // Super Advanced 100x CSS Matrix Mapping + Native Crop logic combo
            zoomSlider.oninput = () => {
                currentZoom = parseFloat(zoomSlider.value);
                zoomLabel.innerText = `Zoom: ${currentZoom.toFixed(1)}x`;
                applyVideoTransforms();
            };

            // Dynamic Combiner for Zoom + Smooth Stabilization Engine
            function applyVideoTransforms() {
                let transformStr = `scale(${currentZoom})`;
                if (isStabilized) {
                    // Adds a micro-compensation factor to dampen heavy frame shaking
                    transformStr += ` translate3d(0px, 0px, 0px) rotate(0.001deg)`;
                }
                video.style.transform = transformStr;
            }

            aiToggle.onclick = () => {
                isAiEnhanced = !isAiEnhanced;
                video.classList.toggle('ai-enhanced');
                aiToggle.innerText = isAiEnhanced ? "AI ON" : "AI OFF";
                aiToggle.style.color = isAiEnhanced ? "#fff" : "#00ffcc";
                aiToggle.style.backgroundColor = isAiEnhanced ? "#00ffcc" : "transparent";
            };

            // High Precision Stabilization Activation Logic
            stabToggle.onclick = () => {
                isStabilized = !isStabilized;
                video.classList.toggle('stabilized');
                applyVideoTransforms();
                
                stabToggle.innerText = isStabilized ? "STAB ULTRA" : "STAB OFF";
                stabToggle.style.color = isStabilized ? "#000" : "#ffcc00";
                stabToggle.style.backgroundColor = isStabilized ? "#ffcc00" : "transparent";
                stabToggle.style.borderColor = "#ffcc00";
            };

            snapBtn.onclick = () => {
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                const ctx = canvas.getContext('2d');
                
                ctx.translate(canvas.width / 2, canvas.height / 2);
                ctx.scale(currentZoom, currentZoom);
                ctx.translate(-canvas.width / 2, -canvas.height / 2);
                
                if(isAiEnhanced) ctx.filter = "saturate(1.25) contrast(1.15) brightness(1.05)";
                ctx.drawImage(video, 0, 0);
                
                const dataUrl = canvas.toDataURL('image/png');
                const base64Data = dataUrl.split(',')[1];
                if (window.AndroidBridge && window.AndroidBridge.saveImageToGallery) {
                    window.AndroidBridge.saveImageToGallery(base64Data);
                }
            };

            recordBtn.onclick = () => {
                if (mediaRecorder && mediaRecorder.state === "recording") {
                    mediaRecorder.stop();
                    recordBtn.classList.remove('recording');
                    resSelect.disabled = false;
                    fpsSelect.disabled = false;
                } else {
                    recordedChunks = [];
                    resSelect.disabled = true;
                    fpsSelect.disabled = true;
                    mediaRecorder = new MediaRecorder(window.stream);
                    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
                    mediaRecorder.onstop = () => {
                        const blob = new Blob(recordedChunks, { type: "video/mp4" });
                        const reader = new FileReader();
                        reader.readAsDataURL(blob);
                        reader.onloadend = () => {
                            const base64Data = reader.result.split(',')[1];
                            if (window.AndroidBridge && window.AndroidBridge.saveVideoToGallery) {
                                window.AndroidBridge.saveVideoToGallery(base64Data);
                            }
                        };
                    };
                    mediaRecorder.start();
                    recordBtn.classList.add('recording');
                }
            };

            resSelect.onchange = initCamera;
            fpsSelect.onchange = initCamera;
            window.onload = initCamera;
        </script>
        </body>
        </html>
        EOF

    - name: Setup Gradle Environment Wrapper
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.5'

    - name: Build Android Debug APK
      run: gradle assembleDebug

    - name: Publish Compiled Live App Binary
      uses: actions/upload-artifact@v4
      with:
        name: AI-Ultra-Camera-Engine
        path: app/build/outputs/apk/debug/app-debug.apk
